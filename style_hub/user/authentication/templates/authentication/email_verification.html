<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Verify Your Email | STYLE-HUB</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#0c1f40",
                        "background": "#001232",
                        "secondary": "#b4c7ee",
                        "primary": "#c6c6c7",
                        "surface-container-high": "#18294b",
                        "outline-variant": "#44474e",
                        "outline": "#8f9099",
                        "on-surface": "#d8e2ff",
                        "on-surface-variant": "#c5c6cf",
                        "primary-fixed": "#e2e2e2"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                },
            },
        }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-effect {
            background: rgba(40, 57, 91, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .otp-input {
            width: 100%;
            aspect-ratio: 1 / 1;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            background: #000d28;
            border: 1px solid transparent;
            outline: none;
            border-radius: 0.75rem;
            color: white;
            transition: all 0.3s ease;
            caret-color: transparent;
        }

        .otp-input:focus {
            box-shadow: 0 0 0 2px rgba(198, 198, 199, 0.3);
            border-color: #c6c6c7;
            transform: scale(1.05);
        }

        .popup-show {
            opacity: 1 !important;
            transform: translateY(0) scale(1) !important;
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary selection:text-black">

    <!-- Animated Popup -->
    <div id="otpPopup"
        class="fixed top-6 right-6 z-50 hidden opacity-0 translate-y-[-30px] scale-90 transition-all duration-500">

        <div class="bg-green-500/10 border border-green-400/30 backdrop-blur-xl
                    rounded-2xl px-6 py-4 shadow-2xl flex items-center gap-4">

            <div class="w-12 h-12 rounded-full bg-green-400/20 flex items-center justify-center animate-pulse">
                <span class="material-symbols-outlined text-green-300 text-3xl">
                    check_circle
                </span>
            </div>

            <div>
                <h3 class="text-white font-bold text-sm tracking-wide">
                    OTP Sent Successfully
                </h3>

                <p class="text-green-200/80 text-xs mt-1">
                    A new verification code has been sent ✨
                </p>
            </div>
        </div>
    </div>

    <!-- Background -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-surface-container-high/30 blur-[120px]"></div>
        <div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[100px]"></div>
    </div>

    <!-- Main -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-6 lg:p-12">
        <div class="w-full max-w-[520px] glass-effect rounded-[2rem] p-10 lg:p-14 shadow-[0px_40px_80px_rgba(0,13,40,0.6)] flex flex-col items-center">

            <!-- Logo -->
            <div class="mb-12">
                <span class="text-2xl font-black tracking-tighter text-white uppercase">STYLE-HUB</span>
            </div>

            <!-- Heading -->
            <div class="mb-8 flex flex-col items-center text-center">
                <div class="w-16 h-16 rounded-full bg-secondary-container/30 flex items-center justify-center mb-6 border border-secondary/20">
                    <span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
                </div>

                <h1 class="text-3xl font-extrabold tracking-tight text-white mb-3">
                    Verify Your Email
                </h1>

                <p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px]">
                    Enter the 6-digit code sent to your email address.
                </p>
            </div>

            <!-- Messages -->
            {% include 'toast.html' %}

            <!-- OTP Form -->
            <form method="POST" class="w-full space-y-8">
                {% csrf_token %}

                <div class="flex justify-center gap-4 mt-6">

                    <input type="text" maxlength="1" name="otp1"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-x1
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />

                    <input type="text" maxlength="1" name="otp2"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-xl
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />

                    <input type="text" maxlength="1" name="otp3"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-xl
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />

                    <input type="text" maxlength="1" name="otp4"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-xl
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />

                    <input type="text" maxlength="1" name="otp5"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-xl
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />

                    <input type="text" maxlength="1" name="otp6"
                        class="otp-input w-14 h-16 text-center text-2xl font-bold rounded-xl
                        bg-surface-container-high border border-outline-variant/30
                        text-white focus:ring-2 focus:ring-primary outline-none" />
                </div>

                <button type="submit"
                    class="w-full py-5 bg-primary-fixed hover:bg-primary text-black font-bold rounded-full transition-all duration-300 transform active:scale-95 shadow-xl tracking-wide">
                    Verify
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-12 w-full flex flex-col items-center gap-6">

                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-on-surface-variant text-lg">
                        schedule
                    </span>

                    <span id="timer" class="text-sm font-mono text-white tracking-widest">
                        00:30
                    </span>
                </div>

                <div class="flex flex-col items-center gap-2">

                    <p class="text-xs text-on-surface-variant uppercase tracking-[0.2em]">
                        Didn't receive the code?
                    </p>

                    <button id="resendBtn"
                            class="text-sm font-bold text-gray-400 cursor-not-allowed underline"
                            disabled>
                        Resend Code
                    </button>
                </div>

                <a href="{% url 'login' %}"
                   class="text-xs text-on-surface-variant hover:text-white transition-colors underline underline-offset-4 decoration-outline-variant/50">
                    Back to Login
                </a>
            </div>
        </div>
    </main>

    <script>

        const otpInputs = document.querySelectorAll('.otp-input');

        otpInputs.forEach((input, index) => {

            input.addEventListener('input', (e) => {

                e.target.value = e.target.value.replace(/[^0-9]/g, '');

                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {

                if (e.key === 'Backspace' && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {

                e.preventDefault();

                const pastedData = (e.clipboardData || window.clipboardData)
                    .getData('text')
                    .replace(/\D/g, '')
                    .slice(0, 6);

                pastedData.split('').forEach((char, i) => {

                    if (otpInputs[i]) {
                        otpInputs[i].value = char;
                    }
                });

                const nextIndex = Math.min(pastedData.length, otpInputs.length - 1);

                otpInputs[nextIndex].focus();
            });
        });

        // TIMER
        const resendBtn = document.getElementById('resendBtn');
        const timerElement = document.getElementById('timer');

        const TIMER_DURATION = 30;
        let endTime = localStorage.getItem('otpEndTime_signup');

        if (!endTime || new Date().getTime() > endTime) {
            endTime = new Date().getTime() + TIMER_DURATION * 1000;
            localStorage.setItem('otpEndTime_signup', endTime);
        }

        let countdown = setInterval(updateTimer, 1000);
        let timeLeft = 0;
        updateTimer(); // Initial call to avoid 1-second delay

        function updateTimer() {
            let now = new Date().getTime();
            let timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));

            let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;

            timerElement.textContent = `00:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.textContent = '00:00';
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                resendBtn.classList.add('text-white', 'cursor-pointer');
            }
        }

        // POPUP
        function showPopup(message = "New OTP Sent ✅") {

            const popup = document.getElementById('otpPopup');

            popup.querySelector('h3').innerText = message;

            popup.classList.remove('hidden');

            setTimeout(() => {
                popup.classList.add('popup-show');
            }, 10);

            setTimeout(() => {

                popup.classList.remove('popup-show');

                setTimeout(() => {
                    popup.classList.add('hidden');
                }, 500);

            }, 3000);
        }

        // RESEND OTP
        resendBtn.addEventListener('click', function () {

            if (timeLeft > 0) return;

            fetch("{% url 'resend_signup_otp' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            })

            .then(res => res.json())

            .then(data => {

                if (data.success) {

                    showPopup();

                    endTime = new Date().getTime() + TIMER_DURATION * 1000;
                    localStorage.setItem('otpEndTime_signup', endTime);

                    resendBtn.disabled = true;

                    resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');

                    resendBtn.classList.remove('text-white', 'cursor-pointer');

                    clearInterval(countdown);

                    countdown = setInterval(updateTimer, 1000);
                    updateTimer();

                } else {

                    showPopup(data.message);
                }
            })

            .catch(error => {

                console.log(error);

                showPopup("Something went wrong");
            });
        });

    </script>

</body>
</html>
