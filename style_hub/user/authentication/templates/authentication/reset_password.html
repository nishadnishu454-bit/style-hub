<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password | STYLE-HUB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#1d3050",
              "surface-container-low": "#071b3b",
              "primary-container": "#1d1f20",
              "surface-variant": "#233456",
              "on-primary-fixed": "#1a1c1c",
              "secondary-fixed-dim": "#b4c7ee",
              "primary-fixed-dim": "#c6c6c7",
              "outline": "#8f9099",
              "error-container": "#93000a",
              "secondary-fixed": "#d7e3ff",
              "on-tertiary-fixed-variant": "#80272b",
              "on-tertiary-fixed": "#410007",
              "on-primary": "#2f3131",
              "surface-dim": "#001232",
              "surface-container": "#0c1f40",
              "secondary": "#b4c7ee",
              "error": "#ffb4ab",
              "surface-tint": "#c6c6c7",
              "on-secondary-fixed-variant": "#344768",
              "on-error-container": "#ffdad6",
              "inverse-surface": "#d8e2ff",
              "on-surface-variant": "#c5c6cf",
              "on-secondary-fixed": "#051b3a",
              "on-background": "#d8e2ff",
              "on-primary-container": "#858787",
              "surface-container-lowest": "#000d28",
              "tertiary-fixed": "#ffdad8",
              "surface": "#001232",
              "on-surface": "#d8e2ff",
              "primary-fixed": "#e2e2e2",
              "on-tertiary-container": "#d36565",
              "on-error": "#690005",
              "secondary-container": "#344768",
              "surface-bright": "#28395b",
              "tertiary-fixed-dim": "#ffb3b1",
              "background": "#001232",
              "on-secondary-container": "#a3b5dc",
              "on-tertiary": "#620f17",
              "tertiary": "#ffb3b1",
              "surface-container-high": "#18294b",
              "primary": "#c6c6c7",
              "inverse-primary": "#5d5f5f",
              "tertiary-container": "#470009",
              "outline-variant": "#44474e",
              "on-primary-fixed-variant": "#454747",
              "inverse-on-surface": "#1f3052",
              "surface-container-highest": "#233456"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #001232;
        color: #d8e2ff;
      }
      .glass-card {
        background: rgba(40, 57, 91, 0.4);
        backdrop-filter: blur(20px);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="font-body selection:bg-secondary selection:text-on-secondary min-h-screen flex flex-col">

<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-4 py-20 relative overflow-hidden">
<!-- Decorative Ambient Blurs -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-bright/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/10 rounded-full blur-[100px]"></div>
<section class="w-full max-w-md z-10">
<div class="glass-card rounded-xl p-10 shadow-[0_20px_40px_rgba(0,13,40,0.4)] ring-1 ring-white/10">
<div class="mb-10 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-white mb-3">Reset Your Password</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">Enter your new password below to regain access to your account.</p>
</div>
<form method="POST" action="{% url 'auth_reset_password' %}" class="space-y-6">
    {% csrf_token %}<!-- New Password Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary ml-1">New Password</label>
<div class="relative">
<input id="newPassword"
       class="w-full bg-surface-container/50 border border-outline-variant/20 rounded-lg px-4 py-3.5 text-on-surface"
       placeholder="Enter new password"
       type="password"
       name="password"/>
       
<span onclick="togglePassword('newPassword', this)"
      class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer text-xl">
    visibility_off
</span></div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary ml-1">Confirm Password</label>
<div class="relative">
<input id="confirmPassword"
       class="w-full bg-surface-container/50 border border-outline-variant/20 rounded-lg px-4 py-3.5 text-on-surface"
       placeholder="Confirm new password"
       type="password"
       name="confirm_password"/>

<span onclick="togglePassword('confirmPassword', this)"
      class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer text-xl">
    visibility_off
</span>
</div>
</div>
<!-- Validation Logic UI -->

<!-- Update Button -->
<div class="pt-2">
<button type="submit"
    class="w-full bg-primary-fixed hover:bg-primary text-on-primary-fixed font-bold py-4 rounded-full 
           transition-all duration-300 shadow-lg shadow-primary/5 active:scale-[0.98] 
           tracking-tight">
    Update Password
</button>
</div>
<!-- Hidden Success Message (for visual demonstration) -->
<div class="hidden flex items-center justify-center gap-2 bg-secondary-container/20 py-3 rounded-lg border border-secondary/20">
<span class="material-symbols-outlined text-secondary" data-icon="verified">verified</span>
<p class="text-sm text-secondary font-medium">Password successfully updated</p>
</div>
<div class="text-center pt-2">
<a href="{% url 'login' %}" 
   class="text-xs text-on-surface-variant hover:text-white transition-colors underline underline-offset-4 decoration-outline-variant/50">
    Back to Login
</a>
</div>
</form>
</div>

</section>
</main>
<!-- Suppressing Footer per instructions -->
<script>
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";          // show value
        icon.textContent = "visibility";
    } else {
        input.type = "password";      // hide value
        icon.textContent = "visibility_off";
    }
}
</script>
</body></html>
