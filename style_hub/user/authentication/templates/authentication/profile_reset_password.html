<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Reset Password | STYLE-HUB</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body {
    font-family: 'Manrope', sans-serif;
}
.glass-effect {
    backdrop-filter: blur(20px);
    background: rgba(40, 57, 91, 0.6);
}
</style>
</head>

<body class="bg-[#001232] text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md glass-effect rounded-2xl p-10 shadow-2xl">

    <!-- Title -->
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold">Reset Password</h2>
        <p class="text-slate-400 text-sm mt-2">Create a new password</p>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-4 text-center text-sm p-3 rounded
                {% if message.tags == 'error' %} bg-red-500/20 text-red-300 {% endif %}
                {% if message.tags == 'success' %} bg-green-500/20 text-green-300 {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- FORM -->
    <form method="POST" class="flex flex-col gap-6">
        {% csrf_token %}

        <!-- New Password -->
        <div>
            <label class="text-xs text-slate-400 uppercase">New Password</label>
            <input type="password" name="password"
                placeholder="Enter new password"
                class="w-full mt-2 px-4 py-3 rounded-lg bg-[#0c1f40] border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <!-- Confirm Password -->
        <div>
            <label class="text-xs text-slate-400 uppercase">Confirm Password</label>
            <input type="password" name="confirm_password"
                placeholder="Confirm password"
                class="w-full mt-2 px-4 py-3 rounded-lg bg-[#0c1f40] border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <!-- Submit -->
        <button type="submit" 
            class="w-full bg-white text-black font-bold py-3 rounded-full hover:scale-95 transition-all duration-300">
            Reset Password
        </button>

    </form>

</div>

</body>
</html>
