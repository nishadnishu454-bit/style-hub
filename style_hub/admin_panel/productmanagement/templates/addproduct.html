<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLE-HUB | Add Product</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F6F9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .cropper-container { max-height: 400px; }
    </style>
</head>

<body class="min-h-screen py-10 px-6">
    <main class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 mb-3">Product Management</p>
                <h1 class="text-5xl font-black tracking-tight text-[#111827]">Add Product</h1>
            </div>
            <a href="{% url 'product_listing' %}" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-100 transition-all shadow-sm">
                Back To Products
            </a>
        </div>

        <div class="glass-card rounded-[30px] overflow-hidden shadow-2xl border border-white/60">
            <div class="bg-gradient-to-r from-[#111827] to-[#1F2937] px-12 py-10">
                <h2 class="text-4xl font-black text-white mb-3">Create New Product</h2>
                <p class="text-sm text-gray-300">Add premium inventory into the STYLE-HUB marketplace.</p>
            </div>

            {% include 'toast.html' %}

            <form method="POST" enctype="multipart/form-data" id="productForm">
                {% csrf_token %}
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 p-12">
                    <!-- LEFT SIDE -->
                    <div class="lg:col-span-7 space-y-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Product Name</label>
                            <input type="text" name="product_name" value="{{old_data.product_name}}" placeholder="Minimalist Oversized Hoodie" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Product Description</label>
                            <textarea rows="7" name="description" placeholder="Enter detailed product description..." class="w-full p-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none resize-none focus:border-black transition-all shadow-sm" required>{{ old_data.description }}</textarea>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Category</label>
                            <div class="relative">
                                <select name="category" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none appearance-none focus:border-black transition-all shadow-sm" required>
                                    <option value="">Select Category</option>
                                    {% for category in categories %}
                                        <option value="{{ category.id }}"
                                        {% if old_data.category == category.id|stringformat:"s" %}
                                            selected
                                        {% endif %}
                                        >{{ category.category_name }}</option>
                                    {% endfor %}
                                </select>
                                <div class="absolute inset-y-0 right-6 flex items-center text-gray-400">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE (IMAGES) -->
                </div>

                <div class="px-12 py-8 bg-gray-50 border-t border-gray-100 flex justify-end items-center space-x-5">
                    <a href="{% url 'product_listing' %}" class="text-sm font-semibold text-gray-500 hover:text-black transition-all">Cancel</a>
                    <button type="submit" class="bg-black text-white px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest shadow-xl hover:scale-105 hover:bg-gray-800 transition-all">
                        Save Product
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Crop Modal -->
    <div id="cropModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-lg font-black uppercase tracking-widest">Crop Image</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6">
                <div class="cropper-container bg-gray-100 rounded-xl overflow-hidden">
                    <img id="cropperImage" class="max-w-full">
                </div>
            </div>
            <div class="p-6 bg-gray-50 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-6 py-3 text-xs font-bold uppercase text-gray-500 hover:text-black">Cancel</button>
                <button onclick="cropImage()" class="bg-black text-white px-8 py-3 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-gray-800">Apply Crop</button>
            </div>
        </div>
    </div>

    <script>
        let cropper;
        let currentIdx;
        const modal = document.getElementById('cropModal');
        const cropperImage = document.getElementById('cropperImage');

        function initCropper(event, idx) {
            const file = event.target.files[0];
            if (!file) return;

            currentIdx = idx;
            const reader = new FileReader();
            reader.onload = function(e) {
                cropperImage.src = e.target.result;
                modal.classList.remove('hidden');
                if (cropper) cropper.destroy();
                cropper = new Cropper(cropperImage, {
                    aspectRatio: 3 / 4,
                    viewMode: 2,
                    guides: true,
                    autoCropArea: 1,
                });
            };
            reader.readAsDataURL(file);
        }

        function closeModal() {
            modal.classList.add('hidden');
            if (cropper) cropper.destroy();
        }

        function cropImage() {
            const canvas = cropper.getCroppedCanvas({
                width: 600,
                height: 800,
            });
            const base64 = canvas.toDataURL('image/jpeg', 0.9);
            
            document.getElementById('croppedImage' + currentIdx).value = base64;
            const preview = document.getElementById('preview' + currentIdx);
            const content = document.getElementById('content' + currentIdx);
            
            preview.src = base64;
            preview.classList.remove('hidden');
            content.classList.add('hidden');
            
            closeModal();
        }
    </script>
</body>
</html>
