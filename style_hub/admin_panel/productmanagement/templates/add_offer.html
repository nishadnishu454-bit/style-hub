<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLE-HUB | Add Offer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F6F9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen py-10 px-6">
    <main class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 mb-3">Promotions Management</p>
                <h1 class="text-5xl font-black tracking-tight text-[#111827]">Add Offer</h1>
            </div>
            <a href="{% url 'offer_listing' %}" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-100 transition-all shadow-sm">
                Back To Offers
            </a>
        </div>

        <div class="glass-card rounded-[30px] overflow-hidden shadow-2xl border border-white/60">
            <div class="bg-gradient-to-r from-[#111827] to-[#1F2937] px-12 py-10">
                <h2 class="text-4xl font-black text-white mb-3">Create New Offer</h2>
                <p class="text-sm text-gray-300">Set discount incentives for products or categories.</p>
            </div>

            {% if messages %}
                <div class="px-12 pt-6">
                    {% for message in messages %}
                        <div class="p-4 rounded-xl {% if message.tags == 'error' %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %} text-xs font-bold uppercase tracking-widest">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" id="offerForm">
                {% csrf_token %}
                <div class="p-12 space-y-8">
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Offer Name</label>
                        <input type="text" name="name" placeholder="Summer Season Sale" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Discount Type</label>
                            <div class="relative">
                                <select name="discount_type" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none appearance-none focus:border-black transition-all shadow-sm" required>
                                    <option value="PERCENTAGE">Percentage (%)</option>
                                    <option value="FIXED">Fixed Amount (₹)</option>
                                </select>
                                <div class="absolute inset-y-0 right-6 flex items-center text-gray-400">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Discount Value</label>
                            <input type="number" step="0.01" min="0.01" name="discount_value" placeholder="10.00" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Start Date</label>
                            <input type="date" name="start_date" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">End Date</label>
                            <input type="date" name="end_date" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Offer Target</label>
                        <div class="flex items-center space-x-8 py-2">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="radio" name="offer_target" value="product" checked class="w-4 h-4 text-black focus:ring-black border-gray-300" onchange="toggleTargetFields()">
                                <span class="text-sm font-semibold text-gray-700">Product Specific</span>
                            </label>
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="radio" name="offer_target" value="category" class="w-4 h-4 text-black focus:ring-black border-gray-300" onchange="toggleTargetFields()">
                                <span class="text-sm font-semibold text-gray-700">Category Specific</span>
                            </label>
                        </div>
                    </div>

                    <div id="productSelectDiv">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Select Product</label>
                        <div class="relative">
                            <select name="product" id="productSelect" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none appearance-none focus:border-black transition-all shadow-sm">
                                <option value="">Select a Product</option>
                                {% for product in products %}
                                    <option value="{{ product.id }}">{{ product.product_name }}</option>
                                {% endfor %}
                            </select>
                            <div class="absolute inset-y-0 right-6 flex items-center text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <div id="categorySelectDiv" class="hidden">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Select Category</label>
                        <div class="relative">
                            <select name="category" id="categorySelect" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none appearance-none focus:border-black transition-all shadow-sm">
                                <option value="">Select a Category</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.category_name }}</option>
                                {% endfor %}
                            </select>
                            <div class="absolute inset-y-0 right-6 flex items-center text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="px-12 py-8 bg-gray-50 border-t border-gray-100 flex justify-end items-center space-x-5">
                    <a href="{% url 'offer_listing' %}" class="text-sm font-semibold text-gray-500 hover:text-black transition-all">Cancel</a>
                    <button type="submit" class="bg-black text-white px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest shadow-xl hover:scale-105 hover:bg-gray-800 transition-all">
                        Save Offer
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function toggleTargetFields() {
            const target = document.querySelector('input[name="offer_target"]:checked').value;
            const productDiv = document.getElementById('productSelectDiv');
            const categoryDiv = document.getElementById('categorySelectDiv');
            const productSelect = document.getElementById('productSelect');
            const categorySelect = document.getElementById('categorySelect');

            if (target === 'product') {
                productDiv.classList.remove('hidden');
                categoryDiv.classList.add('hidden');
                categorySelect.removeAttribute('required');
                productSelect.setAttribute('required', 'required');
                categorySelect.value = "";
            } else {
                productDiv.classList.add('hidden');
                categoryDiv.classList.remove('hidden');
                productSelect.removeAttribute('required');
                categorySelect.setAttribute('required', 'required');
                productSelect.value = "";
            }
        }
        
        // Run on page load to bind validation correctly
        window.addEventListener('load', toggleTargetFields);
    </script>
</body>
</html>
