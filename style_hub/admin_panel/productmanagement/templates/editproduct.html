<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | STYLE-HUB</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        body{
            font-family:'Inter',sans-serif;
            background:#F3F4F6;
        }

        .editor-card{
            background:#FFFFFF;
            border:1px solid #F3F4F6;
        }

        .info-card{
            background:#F8FAFC;
        }

        .custom-scroll::-webkit-scrollbar{
            width:6px;
        }

        .custom-scroll::-webkit-scrollbar-thumb{
            background:#E5E7EB;
            border-radius:20px;
        }

    </style>

</head>

<body class="min-h-screen">

    <main class="max-w-5xl mx-auto py-10 px-6">

        <!-- HEADER -->
        <div class="bg-white px-10 py-6 border border-gray-100 flex justify-between items-center mb-8 rounded-sm">

            <div class="flex items-center space-x-4">

               

                <div class="h-4 w-[1px] bg-gray-200"></div>

                <h2 class="text-xl font-black tracking-tighter uppercase">

                    {{ product.product_name }}

                    <span class="text-gray-500 ml-1">

                        #{{ product.id }}

                    </span>

                </h2>

            </div>

            <div class="flex items-center space-x-4">

                <a href="{% url 'product_listing' %}"
                   class="text-black text-[10px] font-black uppercase tracking-widest px-4 py-2 border border-gray-100 hover:bg-gray-50">

                    Cancel

                </a>

                <button form="editForm"
                        type="submit"
                        class="bg-black text-white text-[10px] font-black uppercase tracking-widest px-6 py-2 hover:bg-gray-800">

                    Update Product

                </button>

            </div>

        </div>

{% if messages %}
    {% for message in messages %}
        <div class="mb-4 p-3 rounded
            {% if message.tags == 'error' %}
                bg-red-100 text-red-700
            {% else %}
                bg-green-100 text-green-700
            {% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

        <!-- FORM -->
        <form method="POST"
              enctype="multipart/form-data"
              id="editForm">

            {% csrf_token %}

        <div class="flex justify-center">
                <!-- LEFT -->
                <div class="w-full max-w-5xl space-y-8">                  
                    
                    <!-- PRODUCT SPECIFICATION -->
                    <div class="editor-card p-10 rounded-sm">

                        

                        <div class="space-y-8">

                            <!-- PRODUCT NAME -->
                            <div>

                                <label class="block text-[9px] font-black uppercase tracking-widest text-black mb-2">

                                    Product Name

                                </label>

                                <input type="text"
                                       name="product_name"
                                       value="{{ product.product_name }}"
                                       class="w-full text-2xl font-light text-gray-500 bg-transparent border-none outline-none focus:text-black transition-colors"
                                       required>

                            </div>

                            <!-- DESCRIPTION -->
                            <div>

                                <label class="block text-[9px] font-black uppercase tracking-widest text-black mb-2">

                                    Description

                                </label>

                                <textarea name="description"
                                          rows="5"
                                          class="w-full text-sm leading-relaxed text-gray-500 bg-transparent border-none outline-none resize-none focus:text-black"
                                          required>{{ product.description }}</textarea>

                            </div>

                            <!-- CATEGORY + STOCK -->
                            <div class="grid grid-cols-2 gap-10 pt-6">

                                <!-- CATEGORY -->
                                <div>

                                    <label class="block text-[9px] font-black uppercase tracking-widest text-black mb-2">

                                        Category

                                    </label>

                                    <div class="relative border-b border-gray-100 pb-2">

                                        <select name="category"
                                                class="w-full bg-transparent text-sm outline-none appearance-none cursor-pointer"
                                                required>

                                            {% for category in categories %}

                                                <option value="{{ category.id }}"
                                                    {% if product.category.id == category.id %}
                                                        selected
                                                    {% endif %}>

                                                    {{ category.category_name }}

                                                </option>

                                            {% endfor %}

                                        </select>

                                        <i class="fa-solid fa-chevron-down absolute right-0 top-1 text-[10px] text-gray-400"></i>

                                    </div>

                                </div>



                            </div>

                         

                        </div>

                    </div>

                </div>

            </div>

        </form>

    </main>

</body>
</html>
