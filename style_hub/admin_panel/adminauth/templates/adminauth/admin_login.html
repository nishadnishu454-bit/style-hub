<style>.glass-card {
    background: rgba(40, 57, 91, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }
.silhouette-bg {
    background-image: linear-gradient(to right, #001232 30%, transparent 100%), url(https://lh3.googleusercontent.com/aida-public/AB6AXuCjqyO5qXf35DVyomhJl9Vx-3nAwR6YArRxJIgdz33x2RXkckh1dorBm-2y8GUBhVf03rX-Dj9hTqOUVBfE1CBTkDs8nl8eGDrbXyQaUx256ZOxbeIB81Hbvm44dSwotw7IHiBAEm53UyRvhUJGFwp7rUwFFbYNVIocIvTdWjBJzGAbM_rPG25tIM5M3UNJ27QP9asLA8zWxEJAYCW3fppbKKLYpIkiOgmMy9skA6Bz-CErpTBrPX6pU-LC0Jtfp-8D85x0rFGol1nL);
    background-size: cover;
    background-position: center right;
    opacity: 0.15
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24
    }</style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-primary min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Subtle Background Silhouette -->
<div class="absolute inset-0 silhouette-bg z-0" data-alt="High-fashion male model silhouette in a sharp suit against a neutral backdrop, cinematic lighting, moody and luxurious atmosphere"></div>
<!-- Top Branding Anchor -->
<div class="absolute top-0 left-0 w-full z-20 flex justify-between items-center px-12 py-8">
<span class="text-2xl font-black tracking-tighter text-slate-100 uppercase">STYLE-HUB</span>
</div>
<!-- Login Canvas -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="glass-card rounded-[2rem] p-10 shadow-[0px_20px_40px_rgba(0,13,40,0.4)] border border-white/5">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="text-4xl font-headline font-extrabold tracking-tight text-white mb-2 leading-tight">Admin Login</h1>
</div>

{% if messages %}
    <div class="space-y-3 mb-6">
        {% for message in messages %}
            <div class="px-4 py-3 rounded-lg
                {% if message.tags == 'error' %}
                    bg-red-500/10 border border-red-500 text-red-300
                {% elif message.tags == 'success' %}
                    bg-green-500/10 border border-green-500 text-green-300
                {% else %}
                    bg-blue-500/10 border border-blue-500 text-blue-300
                {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<!-- Login Form -->
<form method="POST" action="{% url 'admin_login' %}" class="space-y-6">
    {% csrf_token %}

    <!-- Username -->
    <div class="space-y-2">
        <label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant ml-1">
            Username
        </label>
        <div class="relative">
            <input
                class="w-full bg-surface-container-low border-2 border-error/50 rounded-xl px-5 py-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-error transition-all duration-300"
                placeholder="stylehub"
                type="text"
                name="username"
                value="{{ request.POST.username }}"
            />
        </div>
    </div>

    <!-- Password -->
    <div class="space-y-2">
        <div class="flex justify-between items-end px-1">
    <label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant">
        Password
    </label>

    <a href="{% url 'admin_forgottpassword' %}"
       class="text-[11px] font-bold text-primary-fixed hover:text-white transition-colors uppercase tracking-tighter">
        Forgot Password?
    </a>
</div>

        <div class="relative">
            <input 
                class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-5 py-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/20 transition-all duration-300"
                placeholder="••••••••"
                type="password"
                name="password"
            />
        </div>
    </div>

    <!-- Submit -->
    <button 
        class="w-full bg-primary-fixed text-on-primary-fixed font-bold py-5 rounded-full hover:bg-primary transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/10 uppercase tracking-widest text-xs mt-4"
        type="submit">
        Login
    </button>

</form>

<!-- Bottom Redirect -->

</div>
</main>
<!-- Footer Identity -->

</body></html>
