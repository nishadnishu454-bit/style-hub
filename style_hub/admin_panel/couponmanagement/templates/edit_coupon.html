<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLE-HUB | Edit Coupon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F6F9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen py-10 px-6">
    <main class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 mb-3">Promotions Management</p>
                <h1 class="text-5xl font-black tracking-tight text-[#111827]">Edit Coupon</h1>
            </div>
            <a href="{% url 'coupon_listing' %}" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-100 transition-all shadow-sm">
                Back To Coupons
            </a>
        </div>

        <div class="glass-card rounded-[30px] overflow-hidden shadow-2xl border border-white/60">
            <div class="bg-gradient-to-r from-[#111827] to-[#1F2937] px-12 py-10">
                <h2 class="text-4xl font-black text-white mb-3">Modify Coupon Details</h2>
                <p class="text-sm text-gray-300">Update promotional settings and discount value configurations.</p>
            </div>

            {% include 'toast.html' %}

            <form method="POST" id="couponForm">
                {% csrf_token %}
                <div class="p-12 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Coupon Code</label>
                            <input type="text" name="code" value="{{ coupon.code }}" placeholder="STYLEHUB50" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm uppercase" required>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Coupon Title</label>
                            <input type="text" name="title" value="{{ coupon.title }}" placeholder="Special Festive Offer" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Coupon Description</label>
                        <textarea rows="4" name="description" placeholder="Enter coupon description details..." class="w-full p-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none resize-none focus:border-black transition-all shadow-sm">{{ coupon.description }}</textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Discount Type</label>
                            <div class="relative">
                                <select name="discount_type" id="discountType" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none appearance-none focus:border-black transition-all shadow-sm" required onchange="toggleMaxDiscountField()">
                                    <option value="PERCENTAGE" {% if coupon.discount_type == 'PERCENTAGE' %}selected{% endif %}>Percentage (%)</option>
                                    <option value="FIXED" {% if coupon.discount_type == 'FIXED' %}selected{% endif %}>Fixed Amount (₹)</option>
                                </select>
                                <div class="absolute inset-y-0 right-6 flex items-center text-gray-400">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Discount Value</label>
                            <input type="number" step="0.01" min="0.01" name="discount_value" value="{{ coupon.discount_value }}" placeholder="10.00" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Minimum Purchase (₹)</label>
                            <input type="number" step="0.01" min="0" name="min_purchase" value="{{ coupon.min_purchase }}" placeholder="499.00" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm">
                        </div>

                        <div id="maxDiscountDiv">
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Maximum Discount (₹)</label>
                            <input type="number" step="0.01" min="0" name="max_discount" id="maxDiscount" value="{{ coupon.max_discount }}" placeholder="100.00" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm">
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Usage Limit per User</label>
                            <input type="number" min="1" name="usage_limit_per_user" value="{{ coupon.usage_limit_per_user }}" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">Start Date</label>
                            <input type="date" name="start_date" value="{{ coupon.start_date|date:'Y-m-d' }}" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>

                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-3">End Date</label>
                            <input type="date" name="end_date" value="{{ coupon.end_date|date:'Y-m-d' }}" class="w-full h-16 px-6 rounded-2xl border border-gray-200 bg-white text-sm outline-none focus:border-black transition-all shadow-sm" required>
                        </div>
                    </div>
                </div>

                <div class="px-12 py-8 bg-gray-50 border-t border-gray-100 flex justify-end items-center space-x-5">
                    <a href="{% url 'coupon_listing' %}" class="text-sm font-semibold text-gray-500 hover:text-black transition-all">Cancel</a>
                    <button type="submit" class="bg-black text-white px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest shadow-xl hover:scale-105 hover:bg-gray-800 transition-all">
                        Update Coupon
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function toggleMaxDiscountField() {
            const type = document.getElementById('discountType').value;
            const maxDiscDiv = document.getElementById('maxDiscountDiv');
            const maxDiscInput = document.getElementById('maxDiscount');
            
            if (type === 'PERCENTAGE') {
                maxDiscDiv.classList.remove('opacity-50');
                maxDiscInput.removeAttribute('disabled');
            } else {
                maxDiscDiv.classList.add('opacity-50');
                maxDiscInput.setAttribute('disabled', 'disabled');
                maxDiscInput.value = "";
            }
        }
        window.addEventListener('load', toggleMaxDiscountField);
    </script>
</body>
</html>
