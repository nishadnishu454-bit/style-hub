{% with url_name=request.resolver_match.url_name %}
<nav class="sticky top-0 w-full z-50 bg-[#001232]/80 backdrop-blur-xl flex justify-between items-center px-8 py-4 max-w-full no-border shadow-[0_20px_40px_rgba(0,13,40,0.4)]">
    <div class="text-2xl font-black tracking-tighter text-white font-manrope">STYLE-HUB</div>
    <div class="hidden md:flex items-center space-x-8 font-manrope tracking-tight">
        <a class="transition-colors {% if url_name == 'home' %}text-white border-b-2 border-white/20 pb-1{% else %}text-slate-400 hover:text-white{% endif %}" href="{% url 'home' %}">Home</a>
        <a class="transition-colors {% if url_name == 'product_page' %}text-white border-b-2 border-white/20 pb-1{% else %}text-slate-400 hover:text-white{% endif %}" href="{% url 'product_page' %}">Products</a>
        <a class="transition-colors {% if url_name == 'category_page' %}text-white border-b-2 border-white/20 pb-1{% else %}text-slate-400 hover:text-white{% endif %}" href="{% url 'category_page' %}">Categories</a>
        <a class="transition-colors {% if url_name == 'about_page' %}text-white border-b-2 border-white/20 pb-1{% else %}text-slate-400 hover:text-white{% endif %}" href="{% url 'about_page' %}">About</a>
    </div>
    <div class="hidden lg:flex items-center flex-1 max-w-xs mx-8 relative group">
        <span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-white transition-colors text-sm">search</span>
        <input class="w-full bg-white/5 border-none focus:ring-1 focus:ring-white/20 rounded-full py-2 pl-10 pr-4 text-sm text-white placeholder:text-slate-500 transition-all focus:bg-white/10" placeholder="Search collections..." type="text"/>
    </div>
    <div class="flex items-center space-x-6 text-slate-200">
        <a href="{% url 'wishlist_page' %}" class="hover:text-white transition-colors flex items-center">
            <span class="material-symbols-outlined">favorite</span>
        </a>

        <a href="{% url 'cart_page' %}" class="relative p-2 text-slate-200 hover:bg-white/5 rounded-full transition-all duration-200 flex items-center">
            <span class="material-symbols-outlined">shopping_bag</span>
            {% if cart_count > 0 %}
                <span class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold px-1.5 py-0.5 rounded-full">
                    {{ cart_count }}
                </span>
            {% endif %}
        </a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'profile' %}" class="hover:bg-white/5 transition-all duration-300 p-2 rounded-full scale-95 active:scale-90 inline-block flex items-center">
                <span class="material-symbols-outlined">person</span>
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="hover:bg-white/5 transition-all duration-300 p-2 rounded-full scale-95 active:scale-90 inline-block flex items-center">
                <span class="material-symbols-outlined">person</span>
            </a>
        {% endif %}
    </div>
</nav>
{% endwith %}
